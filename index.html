<!DOCTYPE html>
<html lang="id">
<head>

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #0a0a0a;
            background-image: radial-gradient(circle at 20% 80%, #ff00ff 0%, transparent 50%), radial-gradient(circle at 80% 20%, #00ffff 0%, transparent 50%);

        .media-card { background: #1a1a2e; border: 3px solid #00ffff; padding: 8px; box-shadow: 8px 8px 0px #ff00ff; }
        img, video { width: 100%; height: auto; border: 1px solid #fff; display: block; }
        .message-box { background: rgba(0, 0, 0, 0.6); border: 2px dashed #ffff00; padding: 20px; margin: 30px 0; text-align: center; width: 100%; max-width: 400px; }
        .signature { margin-top: 20px; color: #ffff00; font-family: 'Press Start 2P'; font-size: 0.6rem; }

</head>
